name: CI Pipeline

on:
  push:
    branches:
      - main
      - bayanna
  pull_request:
    branches:
      - main
      - bayanna

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Set up Docker Buildx (for advanced docker builds)
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t web-scraper:latest .

      # Optional: Add Docker push if you want to push to registry
